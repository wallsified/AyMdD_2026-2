name: Publish Quarto Presentation to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Debug: list contents
      - name: List repository contents (debug)
        run: |
          pwd
          ls -R

      # Verify that presentation.html exists where we expect it
      - name: Verify presentation.html exists
        run: |
          if [ ! -f "Tarea 2/presentation/presentation.html" ]; then
            echo "File not found: 'Tarea 2/presentation/presentation.html'"
            exit 1
          fi
          echo "Found presentation.html:"
          ls -l "Tarea 2/presentation/presentation.html"

      # Prepare the site: copy presentation.html to index.html
      # and include styles.css + imagenes directory.
      - name: Prepare site directory
        run: |
          mkdir -p _site
          cp "Tarea 2/presentation/presentation.html" "_site/index.html"
          cp "Tarea 2/presentation/styles.css" "_site/" || true
          if [ -d "Tarea 2/presentation/imagenes" ]; then
            cp -R "Tarea 2/presentation/imagenes" "_site/imagenes"
          fi
          echo "Files in _site:"
          ls -R _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
